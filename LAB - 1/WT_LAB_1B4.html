<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let dayDateInput = prompt("Enter The Date (YYYY-MM-DD): ");
        let dayDate = new Date(dayDateInput);
        let days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        let dayname = days[dayDate.getDay()];
        alert("The Day is: " + dayname);

    </script>
</body>

</html>
